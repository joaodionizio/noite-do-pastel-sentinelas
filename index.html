<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Pedidos - Noite do Pastel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --azul-fundo: #0056b3;
            --azul-escuro: #003366;
            --amarelo-brilhante: #ffd200;
            --amarelo-ouro: #e6bd00;
            --branco: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            /* Efeito Sunburst igual ao do panfleto */
            background: 
                radial-gradient(circle at 50% 100%, rgba(255,255,255,0.2) 0%, transparent 50%),
                repeating-conic-gradient(from 0deg at 50% 100%, var(--azul-fundo) 0deg 10deg, var(--azul-escuro) 10deg 20deg);
            background-attachment: fixed;
            color: var(--branco);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Textura de papel sutil por cima de tudo */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            opacity: 0.3;
            pointer-events: none;
        }

        .card-registro {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid rgba(255, 210, 0, 0.3);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        .logo-sm {
            width: 100%;
            max-width: 320px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,210,0,0.5));
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--amarelo-brilhante);
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: var(--amarelo-brilhante);
            font-size: 14px;
            text-transform: uppercase;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            color: var(--azul-escuro);
            font-size: 16px;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--amarelo-brilhante);
            box-shadow: 0 0 10px rgba(255, 210, 0, 0.5);
        }

        /* Botão estilo Faixa/Ribbon */
        .btn-registrar {
            background: linear-gradient(to bottom, var(--amarelo-brilhante), var(--amarelo-ouro));
            color: var(--azul-escuro);
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 5px;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            margin-top: 10px;
            box-shadow: 0 4px 0 #b38600;
            transition: all 0.2s;
            position: relative;
        }

        .btn-registrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #b38600;
        }

        .btn-registrar:active {
            transform: translateY(2px);
            box-shadow: 0 0px 0 #b38600;
        }

        #mensagem {
            margin-top: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .modal-overlay.ativo {
            display: flex;
        }

        .modal-confirmacao {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(180deg, rgba(0, 51, 102, 0.96), rgba(0, 86, 179, 0.96));
            border: 2px solid rgba(255, 210, 0, 0.5);
            border-radius: 18px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.45);
            padding: 28px;
            color: var(--branco);
        }

        .modal-confirmacao h2 {
            margin-top: 0;
            margin-bottom: 10px;
            font-family: 'Cinzel', serif;
            font-size: 24px;
            color: var(--amarelo-brilhante);
            text-transform: uppercase;
        }

        .modal-confirmacao p {
            margin-top: 0;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .resumo-pedido {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 210, 0, 0.28);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .resumo-pedido strong {
            display: block;
            font-size: 12px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--amarelo-brilhante);
            margin-bottom: 4px;
        }

        .resumo-pedido span {
            display: block;
            font-size: 18px;
            margin-bottom: 16px;
            word-break: break-word;
        }

        .resumo-pedido span:last-child {
            margin-bottom: 0;
        }

        .modal-acoes {
            display: flex;
            gap: 12px;
        }

        .btn-secundario,
        .btn-confirmar {
            flex: 1;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-secundario {
            background: rgba(255, 255, 255, 0.14);
            color: var(--branco);
            border: 1px solid rgba(255, 255, 255, 0.28);
        }

        .btn-confirmar {
            background: linear-gradient(to bottom, var(--amarelo-brilhante), var(--amarelo-ouro));
            color: var(--azul-escuro);
            box-shadow: 0 4px 0 #b38600;
        }

        .btn-secundario:hover,
        .btn-confirmar:hover {
            transform: translateY(-1px);
        }

        .btn-secundario:disabled,
        .btn-confirmar:disabled,
        .btn-registrar:disabled {
            cursor: not-allowed;
            opacity: 0.7;
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 520px) {
            .card-registro {
                margin: 20px;
                padding: 28px 22px;
            }

            .modal-confirmacao {
                padding: 22px;
            }

            .modal-acoes {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="card-registro">
    <img src="./logo.png" alt="Logo Sentinelas da Manhã" class="logo-sm">
    <h1>Novo Pedido</h1>

    <div class="form-group">
        <label for="nome">Nome do Cliente</label>
        <input type="text" id="nome" placeholder="Ex: João Silva" required>
    </div>

    <div class="form-group">
        <label for="numero">Número do Pedido</label>
        <input type="number" id="numero" placeholder="000" required>
    </div>

    <button class="btn-registrar" onclick="salvarPedido()">Cadastrar Pedido</button>
    <div id="mensagem"></div>
</div>

<div class="modal-overlay" id="modalConfirmacao" aria-hidden="true">
    <div class="modal-confirmacao" role="dialog" aria-modal="true" aria-labelledby="tituloModalConfirmacao">
        <h2 id="tituloModalConfirmacao">Confirmar Pedido</h2>
        <p>Confira os dados abaixo antes de cadastrar o pedido.</p>

        <div class="resumo-pedido">
            <strong>Nome do Cliente</strong>
            <span id="confirmacaoNome">-</span>

            <strong>Número do Pedido</strong>
            <span id="confirmacaoNumero">-</span>

            <strong>Status Inicial</strong>
            <span id="confirmacaoStatus">-</span>
        </div>

        <div class="modal-acoes">
            <button type="button" class="btn-secundario" onclick="fecharModalConfirmacao()">Editar</button>
            <button type="button" class="btn-confirmar" id="btnConfirmarPedido" onclick="confirmarPedido()">Confirmar Cadastro</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const supabaseClient = window.supabase.createClient(
        "https://ypmizhvosfiiearmvzyd.supabase.co",
        "sb_publishable_3ZRLsJcSR6TMZTJ6N61icw_2DyGzvWh"
    );
    const statusInicial = 'preparo';
    const statusInicialLabel = 'Em preparo';

    function obterDadosFormulario() {
        return {
            nome: document.getElementById('nome').value.trim(),
            numero: document.getElementById('numero').value.trim(),
            status: statusInicial
        };
    }

    function preencherResumoConfirmacao({ nome, numero, status }) {
        document.getElementById('confirmacaoNome').innerText = nome;
        document.getElementById('confirmacaoNumero').innerText = numero;
        document.getElementById('confirmacaoStatus').innerText = status === statusInicial ? statusInicialLabel : status;
    }

    function abrirModalConfirmacao() {
        const modal = document.getElementById('modalConfirmacao');
        modal.classList.add('ativo');
        modal.setAttribute('aria-hidden', 'false');
    }

    function fecharModalConfirmacao() {
        const modal = document.getElementById('modalConfirmacao');
        modal.classList.remove('ativo');
        modal.setAttribute('aria-hidden', 'true');
    }

    function salvarPedido() {
        const { nome, numero, status } = obterDadosFormulario();
        const msgDiv = document.getElementById('mensagem');

        if (!nome || !numero) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        msgDiv.style.display = "none";
        preencherResumoConfirmacao({ nome, numero, status });
        abrirModalConfirmacao();
    }

    async function confirmarPedido() {
        const { nome, numero, status } = obterDadosFormulario();
        const msgDiv = document.getElementById('mensagem');
        const btnRegistrar = document.querySelector('.btn-registrar');
        const btnConfirmar = document.getElementById('btnConfirmarPedido');

        if (!nome || !numero) {
            fecharModalConfirmacao();
            alert("Por favor, preencha todos os campos!");
            return;
        }

        btnRegistrar.disabled = true;
        btnConfirmar.disabled = true;
        btnConfirmar.innerText = "Salvando...";

        const { data, error } = await supabaseClient
            .from('pedidos')
            .insert([
                { cliente: nome, pedido: parseInt(numero, 10), status: status }
            ]);

        btnRegistrar.disabled = false;
        btnConfirmar.disabled = false;
        btnConfirmar.innerText = "Confirmar Cadastro";

        if (error) {
            fecharModalConfirmacao();
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = "#ff4d4d";
            msgDiv.innerText = "Erro ao salvar: " + error.message;
        } else {
            fecharModalConfirmacao();
            msgDiv.style.display = "block";
            msgDiv.style.backgroundColor = "#28a745";
            msgDiv.innerText = "Pedido registrado com sucesso!";
            
            // Limpar formulário
            document.getElementById('nome').value = "";
            document.getElementById('numero').value = "";
            
            // Esconder mensagem após 3 segundos
            setTimeout(() => { msgDiv.style.display = "none"; }, 3000);
        }
    }

    document.getElementById('modalConfirmacao').addEventListener('click', function (event) {
        if (event.target.id === 'modalConfirmacao') {
            fecharModalConfirmacao();
        }
    });

    document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape' && document.getElementById('modalConfirmacao').classList.contains('ativo')) {
            fecharModalConfirmacao();
        }
    });
</script>

</body>
</html>
